<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday Rara Rindu Reski ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================================
           RESET & BASE
           ========================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #fce4ec;
        }

        /* =========================================================
           LOADING SCREEN
           ========================================================= */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        #loadingScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: #880e4f;
            margin-bottom: 30px;
            text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
        }

        .loading-heart-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .loading-heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 120px;
            line-height: 120px;
            text-align: center;
            color: rgba(233, 30, 99, 0.15);
            user-select: none;
            pointer-events: none;
        }

        .loading-heart-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: clip-path 0.3s ease;
            clip-path: inset(100% 0 0 0);
        }

        .loading-heart-fill span {
            font-size: 120px;
            line-height: 120px;
            text-align: center;
            display: block;
            color: #e91e63;
            text-shadow: 0 0 40px rgba(233, 30, 99, 0.4);
            user-select: none;
            pointer-events: none;
        }

        .loading-percent {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #ad1457;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .loading-text {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #6a1b4d;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* =========================================================
           LAYER SYSTEM - semua layer dalam satu file
           ========================================================= */
        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease, transform 1.2s ease;
            z-index: 1;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .layer.fade-out {
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* =========================================================
           LANDING PAGE
           ========================================================= */
        #landing {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        #landing.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Floating elements container */
        .floating-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .float-item {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            font-size: 24px;
            opacity: 0.7;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Landing content */
        .landing-content {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 80px rgba(233, 30, 99, 0.15);
            max-width: 700px;
            width: 90%;
        }

        .landing-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #880e4f;
            margin-bottom: 5px;
            text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
        }

        .landing-name {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #ad1457;
            margin-bottom: 15px;
            text-shadow: 0 2px 30px rgba(233, 30, 99, 0.2);
        }

        .landing-sub {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: #6a1b4d;
            font-weight: 300;
            min-height: 80px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .landing-sub .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%,
            50% {
                opacity: 1;
            }
            51%,
            100% {
                opacity: 0;
            }
        }

        .btn-enter {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.5);
        }

        .btn-enter:active {
            transform: scale(0.97);
        }

        .btn-enter::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .btn-enter:hover::after {
            opacity: 1;
        }

        /* =========================================================
           ENVELOPE PAGE
           ========================================================= */
        #envelope {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1, #f06292);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #envelope.active {
            opacity: 1;
            pointer-events: auto;
        }

        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .envelope-container {
            position: relative;
            width: 300px;
            height: 220px;
            perspective: 900px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .envelope.open {
            transform: rotateX(-8deg) scale(0.95);
        }

        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 72%;
            background: linear-gradient(145deg, #fce4ec, #f8bbd0);
            border-radius: 0 0 18px 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(233, 30, 99, 0.2);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(145deg, #f8bbd0, #f06292);
            clip-path: polygon(0 0, 50% 80%, 100% 0);
            border-radius: 18px 18px 0 0;
            transform-origin: top center;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(233, 30, 99, 0.15);
            border-bottom: none;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(-180deg);
        }

        .envelope-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 65px;
            animation: heartbeat 1.5s ease-in-out infinite;
            z-index: 5;
            filter: drop-shadow(0 4px 20px rgba(233, 30, 99, 0.3));
            transition: all 0.5s;
            cursor: pointer;
        }

        .envelope.open .envelope-heart {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            14% {
                transform: translate(-50%, -50%) scale(1.3);
            }
            28% {
                transform: translate(-50%, -50%) scale(1);
            }
            42% {
                transform: translate(-50%, -50%) scale(1.3);
            }
            70% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .envelope-letter {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 88%;
            height: 58%;
            background: #fffdf7;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 18px 16px;
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(233, 30, 99, 0.1);
            overflow: hidden;
            z-index: 2;
        }

        .envelope.open .envelope-letter {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }

        .envelope-letter-preview {
            font-family: 'Dancing Script', cursive;
            font-size: 13px;
            color: #6a1b4d;
            text-align: center;
            line-height: 1.6;
            opacity: 0.7;
        }

        .envelope-letter-preview .big {
            font-size: 26px;
            display: block;
            margin-bottom: 5px;
        }

        .envelope-hint {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            color: #6a1b4d;
            margin-top: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: pulseText 2s ease-in-out infinite;
            z-index: 5;
            position: relative;
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* =========================================================
           LETTER PAGE (Surat penuh setelah amplop terbuka)
           ========================================================= */
        #letterPage {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 85;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #letterPage.active {
            opacity: 1;
            pointer-events: auto;
        }

        .letter-card {
            background: #fffdf7;
            max-width: 620px;
            width: 95%;
            max-height: 80vh;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 30px rgba(233, 30, 99, 0.06);
            border: 1px solid rgba(233, 30, 99, 0.08);
            overflow-y: auto;
            position: relative;
            transform: translateY(30px);
            opacity: 0;
            transition: all 1s ease;
        }

        #letterPage.active .letter-card {
            transform: translateY(0);
            opacity: 1;
        }

        .letter-card::-webkit-scrollbar {
            width: 4px;
        }
        .letter-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .letter-card::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .letter-content {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.1rem, 1.8vw, 1.5rem);
            color: #4a1a2c;
            line-height: 2;
            white-space: pre-wrap;
            min-height: 300px;
        }

        .letter-content .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        .letter-content .highlight {
            color: #e91e63;
            font-weight: 700;
        }

        .letter-content .sign {
            display: block;
            text-align: right;
            margin-top: 20px;
            font-size: 1.2em;
            color: #ad1457;
        }

        .btn-next {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
            margin-top: 25px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .btn-next.show {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        /* =========================================================
           GALLERY PAGE
           ========================================================= */
        #gallery {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 70;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #gallery.active {
            opacity: 1;
            pointer-events: auto;
        }

        .gallery-container {
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 10px 0;
        }

        .gallery-container::-webkit-scrollbar {
            width: 4px;
        }
        .gallery-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .gallery-container::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .gallery-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #880e4f;
            text-align: center;
            margin-bottom: 25px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 5px;
        }

        .gallery-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(233, 30, 99, 0.06);
            opacity: 0;
            transform: translateY(40px);
        }

        .gallery-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.12);
            border-color: rgba(233, 30, 99, 0.15);
        }

        .gallery-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .gallery-card .card-info {
            padding: 15px 18px 18px;
        }

        .gallery-card .card-info h4 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #4a1a2c;
            margin-bottom: 4px;
        }

        .gallery-card .card-info p {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.3px;
        }

        .gallery-btn-wrap {
            text-align: center;
            margin-top: 30px;
        }

        .btn-galaxy {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
        }

        .btn-galaxy:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        /* =========================================================
           GALAXY PAGE - Planet Saturnus
           ========================================================= */
        #galaxy {
            background: #0a0a0a;
            z-index: 60;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #galaxy.active {
            opacity: 1;
            pointer-events: auto;
        }

        #galaxy-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .galaxy-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            animation: pulseText 3s ease-in-out infinite;
        }

        /* =========================================================
           FINAL MESSAGE - muncul di atas galaxy
           ========================================================= */
        .final-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        .final-message.show {
            opacity: 1;
        }

        .final-message h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 0 40px rgba(233, 30, 99, 0.6), 0 0 80px rgba(233, 30, 99, 0.3);
            margin-bottom: 10px;
        }

        .final-message h2 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #f48fb1;
            text-shadow: 0 0 30px rgba(233, 30, 99, 0.4);
            font-weight: 400;
        }

        .final-message p {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        /* =========================================================
           RESPONSIVE FIXES
           ========================================================= */
        @media (max-width: 600px) {
            .landing-content {
                padding: 30px 25px;
            }

            .envelope-container {
                width: 220px;
                height: 160px;
            }

            .envelope-heart {
                font-size: 45px;
            }

            .letter-card {
                padding: 30px 20px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }

            .gallery-card img {
                height: 150px;
            }

            .gallery-card .card-info h4 {
                font-size: 12px;
            }

            .final-message h1 {
                font-size: 1.8rem;
            }
            .final-message h2 {
                font-size: 1.2rem;
            }

            .loading-heart-container {
                width: 80px;
                height: 80px;
            }
            .loading-heart-bg {
                font-size: 80px;
                line-height: 80px;
            }
            .loading-heart-fill span {
                font-size: 80px;
                line-height: 80px;
            }
        }

        @media (max-width: 400px) {
            .envelope-container {
                width: 170px;
                height: 125px;
            }
            .envelope-heart {
                font-size: 35px;
            }
            .letter-content {
                font-size: 1rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .gallery-card img {
                height: 120px;
            }
            .loading-heart-container {
                width: 60px;
                height: 60px;
            }
            .loading-heart-bg {
                font-size: 60px;
                line-height: 60px;
            }
            .loading-heart-fill span {
                font-size: 60px;
                line-height: 60px;
            }
        }

        /* =========================================================
           UTILITY
           ========================================================= */
        .no-scrollbar::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        .galaxy-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 1;
            animation: pulseText 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <!-- ==========================================================
    LOADING SCREEN
    ========================================================== -->
    <div id="loadingScreen">
        <div class="loading-title">Loading Love ❤️</div>
        <div class="loading-heart-container">
            <div class="loading-heart-bg">❤️</div>
            <div class="loading-heart-fill" id="heartFill">
                <span>❤️</span>
            </div>
        </div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-text">Mempersiapkan kejutan untuk Rara...</div>
    </div>

    <!-- ==========================================================
    LANDING PAGE
    ========================================================== -->
    <div id="landing" class="layer">
        <div class="floating-container" id="floatingContainer"></div>

        <div class="landing-content">
            <div class="landing-title">Happy Birthday ❤️</div>
            <div class="landing-name">Rara Rindu Reski</div>
            <div class="landing-sub" id="typewriter"></div>
            <button class="btn-enter" id="btnEnter">Click To Enter Our World 💕</button>
        </div>
    </div>

    <!-- ==========================================================
    ENVELOPE PAGE
    ========================================================== -->
    <div id="envelope" class="layer">
        <div class="floating-container" id="envelopeFloating"></div>

        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope-container">
                <div class="envelope" id="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-heart" id="envelopeHeart">❤️</div>
                    <div class="envelope-letter">
                        <div class="envelope-letter-preview">
                            <span class="big">💌</span>
                            Untuk Rara...
                        </div>
                    </div>
                </div>
            </div>
            <div class="envelope-hint" id="envelopeHint">Click The Heart ❤️</div>
        </div>
    </div>

    <!-- ==========================================================
    LETTER PAGE (Surat lengkap)
    ========================================================== -->
    <div id="letterPage" class="layer">
        <div class="letter-card" id="letterCard">
            <div class="letter-content" id="letterContent"></div>
            <button class="btn-next" id="btnNext">Next Memory 📸</button>
        </div>
    </div>

    <!-- ==========================================================
    GALLERY PAGE
    ========================================================== -->
    <div id="gallery" class="layer">
        <div class="gallery-container">
            <h2 class="gallery-title">Our Beautiful Moments Together ❤️</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
            <div class="gallery-btn-wrap">
                <button class="btn-galaxy" id="btnGalaxy">One Last Surprise 🌌</button>
            </div>
        </div>
    </div>

    <!-- ==========================================================
    GALAXY PAGE
    ========================================================== -->
    <div id="galaxy" class="layer">
        <div class="galaxy-loading" id="galaxyLoading">Loading Galaxy...</div>
        <canvas id="galaxy-canvas"></canvas>
        <div class="galaxy-overlay">✨ Scroll to explore • Drag to rotate ✨</div>

        <!-- Final Message -->
        <div class="final-message" id="finalMessage">
            <h1>Forever &amp; Always ❤️</h1>
            <h2>Happy 21st Birthday</h2>
            <p>Rara Rindu Reski</p>
        </div>
    </div>

    <!-- ==========================================================
    AUDIO
    ========================================================== -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music/penjaga-hati.mp3" type="audio/mpeg">
    </audio>


    <!-- ==========================================================
    JAVASCRIPT - SEMUA LOGIC
    ========================================================== -->
    <script>
        // ==========================================================
        // 0. LOADING SCREEN
        // ==========================================================
        const loadingScreen = document.getElementById('loadingScreen');
        const heartFill = document.getElementById('heartFill');
        const loadingPercent = document.getElementById('loadingPercent');

        let loadProgress = 0;

        function simulateLoading() {
            const interval = setInterval(() => {
                loadProgress += Math.random() * 8 + 2;
                if (loadProgress >= 100) {
                    loadProgress = 100;
                    clearInterval(interval);
                    // Hide loading screen
                    setTimeout(() => {
                        loadingScreen.classList.add('hide');
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            // Start typewriter after loading
                            startTypewriter();
                        }, 1500);
                    }, 400);
                }
                updateLoading(loadProgress);
            }, 200);
        }

        function updateLoading(progress) {
            const percent = Math.min(100, Math.round(progress));
            loadingPercent.textContent = percent + '%';
            // Clip path: 100% - progress
            const clip = (100 - percent) + '% 0 0 0';
            heartFill.style.clipPath = 'inset(' + clip + ')';
        }

        // Start loading
        simulateLoading();

        // ==========================================================
        // 1. FLOATING ELEMENTS (Landing & Envelope)
        // ==========================================================
        const floatingEmojis = ['❤️', '🌸', '✨', '🦋', '💖'];

        function createFloatingElements(containerId, count = 25) {
            const container = document.getElementById(containerId);
            if (!container) return;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'float-item';
                el.textContent = floatingEmojis[Math.floor(Math.random() * floatingEmojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (14 + Math.random() * 28) + 'px';
                el.style.animationDuration = (8 + Math.random() * 14) + 's';
                el.style.animationDelay = (Math.random() * 12) + 's';
                el.style.opacity = 0.3 + Math.random() * 0.5;
                container.appendChild(el);
            }
        }

        createFloatingElements('floatingContainer', 30);
        createFloatingElements('envelopeFloating', 20);

        // ==========================================================
        // 2. TYPEWRITER EFFECT (Landing)
        // ==========================================================
        const typewriterText =
            `Today is not just a birthday...\nToday is the day the world\nwas blessed with someone\nincredibly special ❤️`;

        let typewriterStarted = false;

        function startTypewriter() {
            if (typewriterStarted) return;
            typewriterStarted = true;
            const element = document.getElementById('typewriter');
            let index = 0;
            element.innerHTML = '';

            function type() {
                if (index < typewriterText.length) {
                    const char = typewriterText[index];
                    if (char === '\n') {
                        element.innerHTML += '<br>';
                    } else {
                        element.innerHTML += char;
                    }
                    index++;
                    const delay = 50 + (Math.random() * 30 - 15);
                    setTimeout(type, delay);
                } else {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    element.appendChild(cursor);
                }
            }
            type();
        }

        // ==========================================================
        // 3. MUSIC
        // ==========================================================
        const audio = document.getElementById('bgMusic');
        let musicStarted = false;

        function startMusic() {
            if (!musicStarted) {
                audio.play().catch(() => {
                    // Auto-play blocked, user will click again
                });
                musicStarted = true;
            }
        }

        // ==========================================================
        // 4. LANDING → ENVELOPE
        // ==========================================================
        const landing = document.getElementById('landing');
        const envelope = document.getElementById('envelope');
        const btnEnter = document.getElementById('btnEnter');

        btnEnter.addEventListener('click', function() {
            startMusic();

            // Fade out landing
            landing.classList.remove('active');
            landing.classList.add('fade-out');

            // After fade, show envelope
            setTimeout(() => {
                landing.style.display = 'none';
                envelope.classList.add('active');
            }, 1200);
        });

        // ==========================================================
        // 5. ENVELOPE → LETTER (klik heart, amplop terbuka)
        // ==========================================================
        const envelopeWrapper = document.getElementById('envelopeWrapper');
        const envelopeEl = document.getElementById('envelope');
        const envelopeHeart = document.getElementById('envelopeHeart');
        const envelopeHint = document.getElementById('envelopeHint');
        const letterPage = document.getElementById('letterPage');
        const letterContent = document.getElementById('letterContent');
        const btnNext = document.getElementById('btnNext');

        let envelopeOpened = false;
        let letterTypingDone = false;

        // Teks surat yang benar (rapi)
        const letterText =
            `Happy Birthday sayangku, cintaku, Rara Rindu Reski ❤️

        Hari ini adalah hari yang paling istimewa di dunia,
        karena di hari inilah seseorang yang paling sempurna
        lahir ke dunia.

        Aku bersyukur setiap hari karena Tuhan mengizinkan
        aku bertemu denganmu. Kamu adalah hadiah terindah
        yang pernah aku terima.

        Di usiamu yang ke-21 ini, aku berdoa agar semua
        kebaikan selalu menyertaimu. Semoga semua impianmu
        terwujud. Semoga kebahagiaan selalu bersamamu.

        Dan yang terpenting...
        Semoga aku selalu menjadi bagian dari hidupmu.

        Samat ulang tahun cinta nya bee ❤️

        Dari seseorang yang selalu menyayangimu,
        Bee`;

        // Click heart to open envelope
        envelopeHeart.addEventListener('click', function(e) {
            e.stopPropagation();
            if (envelopeOpened) return;
            envelopeOpened = true;

            // Open envelope
            envelopeEl.classList.add('open');
            envelopeHint.textContent = '💌 Surat terbuka...';

            // After envelope opens, show letter page
            setTimeout(() => {
                // Fade envelope
                envelope.classList.remove('active');
                envelope.classList.add('fade-out');

                setTimeout(() => {
                    envelope.style.display = 'none';
                    letterPage.classList.add('active');
                    startLetterTypewriter();
                }, 1200);
            }, 1800);
        });

        // Also click on wrapper as fallback
        envelopeWrapper.addEventListener('click', function(e) {
            if (e.target === envelopeHeart) return;
            if (envelopeOpened) return;
            envelopeHeart.click();
        });

        // ==========================================================
        // 6. LETTER TYPEWRITER
        // ==========================================================
        function startLetterTypewriter() {
            let index = 0;
            letterContent.innerHTML = '';

            function typeLetter() {
                if (index < letterText.length) {
                    const char = letterText[index];
                    if (char === '\n') {
                        letterContent.innerHTML += '<br>';
                    } else {
                        letterContent.innerHTML += char;
                    }
                    index++;
                    const delay = 25 + (Math.random() * 20);
                    setTimeout(typeLetter, delay);
                } else {
                    letterTypingDone = true;
                    btnNext.classList.add('show');
                }
            }

            setTimeout(typeLetter, 600);
        }

        // ==========================================================
        // 7. LETTER → GALLERY
        // ==========================================================
        const galleryPage = document.getElementById('gallery');

        btnNext.addEventListener('click', function() {
            if (!letterTypingDone) return;

            // Fade letter
            letterPage.classList.remove('active');
            letterPage.classList.add('fade-out');

            setTimeout(() => {
                letterPage.style.display = 'none';
                galleryPage.classList.add('active');
                initGallery();
            }, 1200);
        });

        // ==========================================================
        // 8. GALLERY
        // ==========================================================
        const galleryData = [
            { img: 'foto/1.jpeg', title: 'First Meet', desc: 'Awal dari segalanya ❤️' },
            { img: 'foto/2.jpg', title: 'Beautiful Smile', desc: 'Senyum yang selalu kurindukan' },
            { img: 'foto/3.jpeg', title: 'Together', desc: 'Setiap detik bersamamu berharga' },
            { img: 'foto/4.jpg', title: 'Love You', desc: 'Kamu adalah segalanya' },
            { img: 'foto/5.jpg', title: 'Forever', desc: 'Untuk selamanya ❤️' }
        ];

        let galleryInitialized = false;

        function initGallery() {
            if (galleryInitialized) return;
            galleryInitialized = true;

            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            galleryData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f8bbd0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2230%22%3E📸%3C/text%3E%3C/svg%3E'">
                    <div class="card-info">
                        <h4>${item.title}</h4>
                        <p>${item.desc}</p>
                    </div>
                `;
                grid.appendChild(card);

                setTimeout(() => {
                    card.classList.add('visible');
                }, 200 + index * 180);
            });
        }

        // ==========================================================
        // 9. GALLERY → GALAXY
        // ==========================================================
        const galaxyPage = document.getElementById('galaxy');
        const btnGalaxy = document.getElementById('btnGalaxy');

        btnGalaxy.addEventListener('click', function() {
            // Fade gallery
            galleryPage.classList.remove('active');
            galleryPage.classList.add('fade-out');

            setTimeout(() => {
                galleryPage.style.display = 'none';
                galaxyPage.classList.add('active');
                initGalaxy();
            }, 1200);
        });

        // ==========================================================
        // 10. THREE.JS GALAXY - PLANET SATURNUS DENGAN CINCIN
        // ==========================================================
        let galaxyInitialized = false;
        let scene, camera, renderer, controls;
        let particleSystem;
        let ringSystem;
        let animationId;
        let finalMessageShown = false;
        let zoomCheckInterval = null;

        function initGalaxy() {
            if (galaxyInitialized) return;
            galaxyInitialized = true;

            const loading = document.getElementById('galaxyLoading');
            loading.style.display = 'block';

            // Load Three.js from CDN
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = function() {
                const controlsScript = document.createElement('script');
                controlsScript.src =
                'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
                controlsScript.onload = function() {
                    loading.style.display = 'none';
                    setupGalaxyScene();
                };
                controlsScript.onerror = function() {
                    loading.textContent = '⚠️ Error loading controls. Please refresh.';
                };
                document.head.appendChild(controlsScript);
            };
            script.onerror = function() {
                loading.textContent = '⚠️ Error loading Three.js. Please refresh.';
            };
            document.head.appendChild(script);
        }

        function setupGalaxyScene() {
            const canvas = document.getElementById('galaxy-canvas');
            const container = document.getElementById('galaxy');

            // Scene
            scene = new THREE.Scene();

            // Camera
            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 1000);
            camera.position.set(0, 4, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                alpha: false,
                antialias: true
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0a, 1);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.6;
            controls.zoomSpeed = 1.0;
            controls.minDistance = 2.5;
            controls.maxDistance = 45;
            controls.target.set(0, 0, 0);
            controls.update();

            // --- BUAT TEXTURE "Bee ❤️ Rara" ---
            const texture = createTextTexture();

            // ==========================================================
            // PART 1: BOLA PLANET (BULAT DENGAN TEKS)
            // ==========================================================
            const planetParticleCount = 4000;
            const planetPositions = new Float32Array(planetParticleCount * 3);
            const planetSizes = new Float32Array(planetParticleCount);
            const planetColors = new Float32Array(planetParticleCount * 3);
            const planetRandoms = new Float32Array(planetParticleCount);

            const colorPalette = [
                new THREE.Color('#ff80ab'),
                new THREE.Color('#f06292'),
                new THREE.Color('#e91e63'),
                new THREE.Color('#ad1457'),
                new THREE.Color('#f48fb1'),
                new THREE.Color('#d81b60'),
                new THREE.Color('#ff4081'),
            ];

            // Buat bola dengan distribusi sphere
            for (let i = 0; i < planetParticleCount; i++) {
                // Radius planet: 2.5 - 4.5 (bervariasi untuk tekstur)
                const radius = 2.5 + Math.random() * 2.0;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.cos(phi);
                const z = radius * Math.sin(phi) * Math.sin(theta);

                planetPositions[i * 3] = x;
                planetPositions[i * 3 + 1] = y;
                planetPositions[i * 3 + 2] = z;

                // Size: bervariasi
                planetSizes[i] = 0.2 + Math.random() * 0.5;

                // Warna: pink dengan variasi
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                const brightness = 0.7 + Math.random() * 0.3;
                color.multiplyScalar(brightness);
                planetColors[i * 3] = color.r;
                planetColors[i * 3 + 1] = color.g;
                planetColors[i * 3 + 2] = color.b;

                planetRandoms[i] = Math.random() * Math.PI * 2;
            }

            const planetGeo = new THREE.BufferGeometry();
            planetGeo.setAttribute('position', new THREE.BufferAttribute(planetPositions, 3));
            planetGeo.setAttribute('size', new THREE.BufferAttribute(planetSizes, 1));
            planetGeo.setAttribute('color', new THREE.BufferAttribute(planetColors, 3));

            const planetMat = new THREE.PointsMaterial({
                size: 0.3,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.9,
                sizeAttenuation: true,
            });

            particleSystem = new THREE.Points(planetGeo, planetMat);
            scene.add(particleSystem);

            // ==========================================================
            // PART 2: CINCIN SATURNUS
            // ==========================================================
            const ringCount = 5000;
            const ringPositions = new Float32Array(ringCount * 3);
            const ringSizes = new Float32Array(ringCount);
            const ringColors = new Float32Array(ringCount * 3);

            for (let i = 0; i < ringCount; i++) {
                // Radius cincin: 5.5 - 9.5
                const radius = 5.5 + Math.random() * 4.0;
                const angle = Math.random() * Math.PI * 2;

                // Ketebalan cincin tipis
                const thickness = 0.3 + Math.random() * 0.5;
                const yOffset = (Math.random() - 0.5) * thickness;

                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                const y = yOffset * 0.8;

                ringPositions[i * 3] = x;
                ringPositions[i * 3 + 1] = y;
                ringPositions[i * 3 + 2] = z;

                // Size ring: lebih kecil
                ringSizes[i] = 0.15 + Math.random() * 0.35;

                // Warna ring: pink lebih terang
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                const brightness = 0.5 + Math.random() * 0.5;
                color.multiplyScalar(brightness);
                ringColors[i * 3] = color.r;
                ringColors[i * 3 + 1] = color.g;
                ringColors[i * 3 + 2] = color.b;
            }

            const ringGeo = new THREE.BufferGeometry();
            ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
            ringGeo.setAttribute('size', new THREE.BufferAttribute(ringSizes, 1));
            ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));

            const ringMat = new THREE.PointsMaterial({
                size: 0.2,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.6,
                sizeAttenuation: true,
            });

            ringSystem = new THREE.Points(ringGeo, ringMat);
            scene.add(ringSystem);

            // ==========================================================
            // PART 3: BINTANG LATAR BELAKANG
            // ==========================================================
            const starGeo = new THREE.BufferGeometry();
            const starCount = 1000;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                const r = 30 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                starPos[i * 3 + 1] = r * Math.cos(phi);
                starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.06,
                transparent: true,
                opacity: 0.5,
                sizeAttenuation: true,
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ==========================================================
            // PART 4: LIGHTING
            // ==========================================================
            const light = new THREE.PointLight(0xe91e63, 0.5, 30);
            light.position.set(0, 0, 0);
            scene.add(light);

            const ambient = new THREE.AmbientLight(0x222244, 0.2);
            scene.add(ambient);

            // Tambahan light dari samping
            const light2 = new THREE.DirectionalLight(0xff80ab, 0.3);
            light2.position.set(5, 5, 5);
            scene.add(light2);

            // ==========================================================
            // PART 5: RESIZE & ANIMATION
            // ==========================================================
            window.addEventListener('resize', onResize);

            // Start animation
            animateGalaxy();

            // Check zoom for final message
            zoomCheckInterval = setInterval(checkZoomForFinalMessage, 500);
        }

        function createTextTexture() {
            const canvas = document.createElement('canvas');
            const size = 256;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, size, size);

            const text = 'Bee ❤️ Rara';
            const fontSize = 32;
            ctx.font = `bold ${fontSize}px 'Arial', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.shadowColor = 'rgba(233, 30, 99, 0.6)';
            ctx.shadowBlur = 20;

            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#ff80ab');
            gradient.addColorStop(0.5, '#e91e63');
            gradient.addColorStop(1, '#ad1457');
            ctx.fillStyle = gradient;
            ctx.fillText(text, size / 2, size / 2);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.1;
            ctx.fillText(text, size / 2 + 1, size / 2 + 1);
            ctx.globalAlpha = 1;

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function animateGalaxy() {
            animationId = requestAnimationFrame(animateGalaxy);

            // Rotasi planet dan cincin
            if (particleSystem) {
                particleSystem.rotation.y += 0.002;
            }
            if (ringSystem) {
                ringSystem.rotation.y += 0.003;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            const container = document.getElementById('galaxy');
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function checkZoomForFinalMessage() {
            if (!camera) return;
            const distance = camera.position.distanceTo(controls.target);
            if (distance < 4.5 && !finalMessageShown) {
                finalMessageShown = true;
                const finalMsg = document.getElementById('finalMessage');
                finalMsg.classList.add('show');
                clearInterval(zoomCheckInterval);
            }
        }

        // Clean up
        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
            if (zoomCheckInterval) clearInterval(zoomCheckInterval);
            if (renderer) renderer.dispose();
        });

        // ==========================================================
        // 11. KEYBOARD SHORTCUT
        // ==========================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && landing.classList.contains('active')) {
                btnEnter.click();
            }
        });

        // ==========================================================
        // 12. PREVENT TOUCH
        // ==========================================================
        document.getElementById('galaxy-canvas').addEventListener('touchstart', function(e) {
            if (e.target === this) e.preventDefault();
        }, { passive: false });

        console.log('❤️ Happy Birthday Rara Rindu Reski! ❤️');
        console.log('🌌 Website by Bee');
    </script>
</body>
</html>
