<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday Rara Rindu Reski ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #fce4ec;
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        #loadingScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: #880e4f;
            margin-bottom: 30px;
            text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
        }

        .loading-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 700;
            color: #e91e63;
            text-shadow: 0 4px 40px rgba(233, 30, 99, 0.3);
            line-height: 1;
            margin-bottom: 10px;
        }

        .loading-number .percent {
            font-size: clamp(2rem, 4vw, 3rem);
            color: #ad1457;
        }

        .loading-text {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #6a1b4d;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .loading-progress-bar {
            width: 220px;
            height: 4px;
            background: rgba(233, 30, 99, 0.15);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loading-progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e91e63, #ad1457);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 1;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .layer.fade-out {
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        #landing {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        #landing.active {
            opacity: 1;
            pointer-events: auto;
        }

        .floating-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .float-item {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            font-size: 24px;
            opacity: 0.7;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .landing-content {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 80px rgba(233, 30, 99, 0.15);
            max-width: 700px;
            width: 90%;
        }

        .landing-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #880e4f;
            margin-bottom: 5px;
            text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
        }

        .landing-name {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #ad1457;
            margin-bottom: 15px;
            text-shadow: 0 2px 30px rgba(233, 30, 99, 0.2);
        }

        .landing-sub {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: #6a1b4d;
            font-weight: 300;
            min-height: 80px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .landing-sub .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%,
            50% {
                opacity: 1;
            }
            51%,
            100% {
                opacity: 0;
            }
        }

        .btn-enter {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.5);
        }

        .btn-enter:active {
            transform: scale(0.97);
        }

        #envelopePage {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1, #f06292);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #envelopePage.active {
            opacity: 1;
            pointer-events: auto;
        }

        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .envelope-container {
            position: relative;
            width: 300px;
            height: 220px;
            perspective: 900px;
        }

        #envelopeCard {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #envelopeCard.open {
            transform: rotateX(-8deg) scale(0.95);
        }

        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 72%;
            background: linear-gradient(145deg, #fce4ec, #f8bbd0);
            border-radius: 0 0 18px 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(233, 30, 99, 0.2);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(145deg, #f8bbd0, #f06292);
            clip-path: polygon(0 0, 50% 80%, 100% 0);
            border-radius: 18px 18px 0 0;
            transform-origin: top center;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(233, 30, 99, 0.15);
            border-bottom: none;
        }

        #envelopeCard.open .envelope-flap {
            transform: rotateX(-180deg);
        }

        .envelope-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 65px;
            animation: heartbeat 1.5s ease-in-out infinite;
            z-index: 5;
            filter: drop-shadow(0 4px 20px rgba(233, 30, 99, 0.3));
            transition: all 0.5s;
            cursor: pointer;
        }

        #envelopeCard.open .envelope-heart {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            14% {
                transform: translate(-50%, -50%) scale(1.3);
            }
            28% {
                transform: translate(-50%, -50%) scale(1);
            }
            42% {
                transform: translate(-50%, -50%) scale(1.3);
            }
            70% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .envelope-hint {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            color: #6a1b4d;
            margin-top: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: pulseText 2s ease-in-out infinite;
            z-index: 5;
            position: relative;
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        #letterPage {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 85;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease, transform 1.5s ease;
            transform: scale(1.2);
        }

        #letterPage.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .letter-card {
            background: #fffdf7;
            max-width: 620px;
            width: 95%;
            max-height: 80vh;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 30px rgba(233, 30, 99, 0.06);
            border: 1px solid rgba(233, 30, 99, 0.08);
            overflow-y: auto;
            position: relative;
        }

        .letter-card::-webkit-scrollbar {
            width: 4px;
        }
        .letter-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .letter-card::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .letter-content {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 1.5vw, 1.3rem);
            color: #4a1a2c;
            line-height: 2;
            white-space: pre-wrap;
            min-height: 300px;
        }

        .letter-content .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        .btn-next {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
            margin-top: 25px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .btn-next.show {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        #gallery {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 70;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #gallery.active {
            opacity: 1;
            pointer-events: auto;
        }

        .gallery-container {
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 10px 0;
        }

        .gallery-container::-webkit-scrollbar {
            width: 4px;
        }
        .gallery-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .gallery-container::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .gallery-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #880e4f;
            text-align: center;
            margin-bottom: 25px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 5px;
        }

        .gallery-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(233, 30, 99, 0.06);
            opacity: 0;
            transform: translateY(40px);
        }

        .gallery-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.12);
            border-color: rgba(233, 30, 99, 0.15);
        }

        .gallery-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .gallery-card .card-info {
            padding: 15px 18px 18px;
        }

        .gallery-card .card-info h4 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #4a1a2c;
            margin-bottom: 4px;
        }

        .gallery-card .card-info p {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.3px;
        }

        .gallery-btn-wrap {
            text-align: center;
            margin-top: 30px;
        }

        .btn-galaxy {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
        }

        .btn-galaxy:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        #galaxy {
            background: #0a0a0a;
            z-index: 60;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #galaxy.active {
            opacity: 1;
            pointer-events: auto;
        }

        #galaxy-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .galaxy-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            animation: pulseText 3s ease-in-out infinite;
        }

        .galaxy-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 1;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .final-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        .final-message.show {
            opacity: 1;
        }

        .final-message h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 0 40px rgba(233, 30, 99, 0.6), 0 0 80px rgba(233, 30, 99, 0.3);
            margin-bottom: 10px;
        }

        .final-message h2 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #f48fb1;
            text-shadow: 0 0 30px rgba(233, 30, 99, 0.4);
            font-weight: 400;
        }

        .final-message p {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            .landing-content {
                padding: 30px 25px;
            }
            .envelope-container {
                width: 220px;
                height: 160px;
            }
            .envelope-heart {
                font-size: 45px;
            }
            .letter-card {
                padding: 30px 20px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }
            .gallery-card img {
                height: 150px;
            }
            .final-message h1 {
                font-size: 1.8rem;
            }
            .final-message h2 {
                font-size: 1.2rem;
            }
            .loading-number {
                font-size: 3.5rem;
            }
            .loading-progress-bar {
                width: 150px;
            }
        }

        @media (max-width: 400px) {
            .envelope-container {
                width: 170px;
                height: 125px;
            }
            .envelope-heart {
                font-size: 35px;
            }
            .letter-content {
                font-size: 1rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .gallery-card img {
                height: 120px;
            }
            .loading-number {
                font-size: 2.8rem;
            }
            .loading-progress-bar {
                width: 120px;
            }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loading-title">Loading Love ❤️</div>
        <div class="loading-number" id="loadingNumber">0<span class="percent">%</span></div>
        <div class="loading-text">Mempersiapkan kejutan untuk sayang bee 🤭</div>
        <div class="loading-progress-bar">
            <div class="fill" id="loadingFill"></div>
        </div>
    </div>

    <div id="landing" class="layer active">
        <div class="floating-container" id="floatingContainer"></div>
        <div class="landing-content">
            <div class="landing-title">Happy Birthday ❤️</div>
            <div class="landing-name">Sayangku Cintaku ❤️</div>
            <div class="landing-sub" id="typewriter"></div>
            <button class="btn-enter" id="btnEnter">🎵 Click To Enter Our World 💕</button>
        </div>
    </div>

    <div id="envelopePage" class="layer">
        <div class="floating-container" id="envelopeFloating"></div>
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope-container">
                <div id="envelopeCard">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-heart" id="envelopeHeart">❤️</div>
                </div>
            </div>
            <div class="envelope-hint" id="envelopeHint">Click The Heart ❤️</div>
        </div>
    </div>

    <div id="letterPage" class="layer">
        <div class="letter-card" id="letterCard">
            <div class="letter-content" id="letterContent"></div>
            <button class="btn-next" id="btnNext">Next Memory 📸</button>
        </div>
    </div>

    <div id="gallery" class="layer">
        <div class="gallery-container">
            <h2 class="gallery-title">Our Beautiful Moments Together ❤️</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
            <div class="gallery-btn-wrap">
                <button class="btn-galaxy" id="btnGalaxy">One Last Surprise 🌌</button>
            </div>
        </div>
    </div>

    <div id="galaxy" class="layer">
        <div class="galaxy-loading" id="galaxyLoading">Loading Galaxy...</div>
        <canvas id="galaxy-canvas"></canvas>
        <div class="galaxy-overlay">✨ Scroll to explore • Drag to rotate ✨</div>
        <div class="final-message" id="finalMessage">
            <h1>Forever &amp; Always ❤️</h1>
            <h2>Happy 21st Birthday</h2>
            <p>Rara Rindu Reski</p>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="./music/penjaga-hati.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggle" style="position:fixed;top:20px;right:20px;z-index:9999;background:rgba(233,30,99,0.8);border:none;border-radius:50%;width:50px;height:50px;font-size:24px;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(233,30,99,0.4);backdrop-filter:blur(10px);transition:all 0.3s;">🔇</button>

    <script>
        var loadingScreen = document.getElementById('loadingScreen');
        var loadingNumber = document.getElementById('loadingNumber');
        var loadingFill = document.getElementById('loadingFill');

        var loadProgress = 0;

        function simulateLoading() {
            var interval = setInterval(function() {
                loadProgress += Math.random() * 6 + 3;
                if (loadProgress >= 100) {
                    loadProgress = 100;
                    clearInterval(interval);
                    setTimeout(function() {
                        loadingScreen.classList.add('hide');
                        setTimeout(function() {
                            loadingScreen.style.display = 'none';
                            startTypewriter();
                        }, 1500);
                    }, 400);
                }
                updateLoading(loadProgress);
            }, 150);
        }

        function updateLoading(progress) {
            var percent = Math.min(100, Math.round(progress));
            loadingNumber.innerHTML = percent + '<span class="percent">%</span>';
            loadingFill.style.width = percent + '%';
        }

        simulateLoading();

        var floatingEmojis = ['❤️', '🌸', '✨', '🦋', '💖'];

        var galaxyInitialized = false;

        function initGalaxy() {
            if (galaxyInitialized) return;

            var loading = document.getElementById('galaxyLoading');

            var script = document.createElement('script');

            script.onload = function() {

                loading.textContent = '⚠️ Error loading Three.js. Please refresh.';

        function createTextTexture(text) {
            var canvas = document.createElement('canvas');
            var size = 256;
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);
            var fontSize = 34;
            ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(233, 30, 99, 0.8)';
            ctx.shadowBlur = 25;
            var gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#ff80ab');
            gradient.addColorStop(0.5, '#e91e63');
            gradient.addColorStop(1, '#ad1457');
            ctx.fillStyle = gradient;
            ctx.fillText(text, size / 2, size / 2);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.1;
            ctx.fillText(text, size / 2 + 1, size / 2 + 1);
            ctx.globalAlpha = 1;
            var texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function setupGalaxyScene() {
            var canvas = document.getElementById('galaxy-canvas');
            var container = document.getElementById('galaxy');

            scene = new THREE.Scene();
            var aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
            camera.position.set(0, 2, 18);

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                alpha: false,
                antialias: true
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0a, 1);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.6;
            controls.zoomSpeed = 1.0;
            controls.minDistance = 3;
            controls.maxDistance = 30;
            controls.target.set(0, 0, 0);
            controls.enabled = false;
            controls.update();

            var texture = createTextTexture('Bee ❤️ sayang');

            var planetCount = 5000;
            var planetPos = new Float32Array(planetCount * 3);
            var planetSizes = new Float32Array(planetCount);
            var planetColors = new Float32Array(planetCount * 3);

            var colorPalette = [
                new THREE.Color('#ff80ab'),
                new THREE.Color('#f06292'),
                new THREE.Color('#e91e63'),
                new THREE.Color('#ad1457'),
                new THREE.Color('#f48fb1'),
                new THREE.Color('#d81b60'),
                new THREE.Color('#ff4081'),
                new THREE.Color('#c2185b'),
            ];

            for (var i = 0; i < planetCount; i++) {
                var radius = 2.5 + Math.random() * 2.0;
                var theta = Math.random() * Math.PI * 2;
                var phi = Math.acos(2 * Math.random() - 1);
                planetPos[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                planetPos[i * 3 + 1] = radius * Math.cos(phi);
                planetPos[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
                planetSizes[i] = 0.2 + Math.random() * 0.5;
                var color = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                var brightness = 0.7 + Math.random() * 0.3;
                color.multiplyScalar(brightness);
                planetColors[i * 3] = color.r;
                planetColors[i * 3 + 1] = color.g;
                planetColors[i * 3 + 2] = color.b;
            }

            var planetGeo = new THREE.BufferGeometry();
            planetGeo.setAttribute('position', new THREE.BufferAttribute(planetPos, 3));
            planetGeo.setAttribute('size', new THREE.BufferAttribute(planetSizes, 1));
            planetGeo.setAttribute('color', new THREE.BufferAttribute(planetColors, 3));

            var planetMat = new THREE.PointsMaterial({
                size: 0.35,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.92,
                sizeAttenuation: true,
            });

            planetSystem = new THREE.Points(planetGeo, planetMat);
            scene.add(planetSystem);

            var ringCount = 8000;
            var ringPos = new Float32Array(ringCount * 3);
            var ringSizes = new Float32Array(ringCount);
            var ringColors = new Float32Array(ringCount * 3);

            for (var j = 0; j < ringCount; j++) {
                var ringRadius = 4.5 + Math.random() * 4.5;
                var ringAngle = Math.random() * Math.PI * 2;
                var thickness = 0.2 + Math.random() * 0.4;
                var yOffset = (Math.random() - 0.5) * thickness;
                ringPos[j * 3] = ringRadius * Math.cos(ringAngle);
                ringPos[j * 3 + 1] = yOffset * 0.6;
                ringPos[j * 3 + 2] = ringRadius * Math.sin(ringAngle);
                ringSizes[j] = 0.15 + Math.random() * 0.3;
                var ringColor = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                var ringBrightness = 0.4 + Math.random() * 0.6;
                ringColor.multiplyScalar(ringBrightness);
                ringColors[j * 3] = ringColor.r;
                ringColors[j * 3 + 1] = ringColor.g;
                ringColors[j * 3 + 2] = ringColor.b;
            }

            var ringGeo = new THREE.BufferGeometry();
            ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
            ringGeo.setAttribute('size', new THREE.BufferAttribute(ringSizes, 1));
            ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));

            var ringMat = new THREE.PointsMaterial({
                size: 0.2,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.7,
                sizeAttenuation: true,
            });

            ringSystem = new THREE.Points(ringGeo, ringMat);
            scene.add(ringSystem);

            var starGeo = new THREE.BufferGeometry();
            var starCount = 1500;
            var starPos = new Float32Array(starCount * 3);
            for (var k = 0; k < starCount; k++) {
                var r = 30 + Math.random() * 40;
                var theta2 = Math.random() * Math.PI * 2;
                var phi2 = Math.acos(2 * Math.random() - 1);
                starPos[k * 3] = r * Math.sin(phi2) * Math.cos(theta2);
                starPos[k * 3 + 1] = r * Math.cos(phi2);
                starPos[k * 3 + 2] = r * Math.sin(phi2) * Math.sin(theta2);
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            var starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                transparent: true,
                opacity: 0.4,
                sizeAttenuation: true,
            });
            var stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            var light = new THREE.PointLight(0xe91e63, 0.5, 20);
            light.position.set(0, 0, 0);
            scene.add(light);

            var ambient = new THREE.AmbientLight(0x222244, 0.2);
            scene.add(ambient);

            var light2 = new THREE.DirectionalLight(0xff80ab, 0.3);
            light2.position.set(5, 5, 5);
            scene.add(light2);

            galaxyReady = true;
            startCinematicIntro();

            window.addEventListener('resize', onResize);
            animateGalaxy();
            zoomCheckInterval = setInterval(checkZoomForFinalMessage, 500);
        }

        function startCinematicIntro() {
            var progress = 0;
            var startPos = { x: 0, y: 2, z: 18 };
            var endPos = { x: 0, y: 1.5, z: 10 };

            function animateCinematic() {
                if (!galaxyReady) return;
                progress += 0.008;

                if (progress < 1) {
                    var t = progress < 0.5 ?
                        4 * progress * progress * progress :
                        1 - Math.pow(-2 * progress + 2, 3) / 2;

                    camera.position.x = startPos.x + (endPos.x - startPos.x) * t;
                    camera.position.y = startPos.y + (endPos.y - startPos.y) * t;
                    camera.position.z = startPos.z + (endPos.z - startPos.z) * t;

                    var rotAngle = t * 0.25;
                    camera.position.x += Math.sin(rotAngle) * 1.5;

                    controls.target.set(0, 0, 0);
                    controls.update();

                    requestAnimationFrame(animateCinematic);
                } else {
                    controls.enabled = true;
                }
            }

            setTimeout(animateCinematic, 500);
        }

        function animateGalaxy() {
            animationId = requestAnimationFrame(animateGalaxy);

            if (planetSystem) {
                planetSystem.rotation.y += 0.002;
            }
            if (ringSystem) {
                ringSystem.rotation.y += 0.003;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            var container = document.getElementById('galaxy');
            var width = container.clientWidth;
            var height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function checkZoomForFinalMessage() {
            if (!camera) return;
            var distance = camera.position.distanceTo(controls.target);
            if (distance < 3.5 && !finalMessageShown) {
                finalMessageShown = true;
                var finalMsg = document.getElementById('finalMessage');
                finalMsg.classList.add('show');
                clearInterval(zoomCheckInterval);
            }
        }

        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
            if (zoomCheckInterval) clearInterval(zoomCheckInterval);
            if (renderer) renderer.dispose();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && landing.classList.contains('active')) {

            if (e.target === this) e.preventDefault();

        console.log('🌌 Website by Bee');
