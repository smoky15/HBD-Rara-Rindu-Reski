<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday Sayang❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #fce4ec;
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        #loadingScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 700;
            color: #e91e63;
            text-shadow: 0 4px 40px rgba(233, 30, 99, 0.3);
            line-height: 1;
            margin-bottom: 10px;
        }

        .loading-number .percent {
            font-size: clamp(2rem, 4vw, 3rem);
            color: #ad1457;
        }

        .loading-text {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #6a1b4d;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .loading-progress-bar {
            width: 220px;
            height: 4px;
            background: rgba(233, 30, 99, 0.15);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loading-progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e91e63, #ad1457);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 1;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .layer.fade-out {
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        #landing {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        #landing.active {
            opacity: 1;
            pointer-events: auto;
        }

        .floating-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .float-item {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            font-size: 24px;
            opacity: 0.7;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .landing-content {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 80px rgba(233, 30, 99, 0.15);
            max-width: 700px;
            width: 90%;
        }

        .landing-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #880e4f;
            margin-bottom: 5px;
            text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
        }

        .landing-name {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #ad1457;
            margin-bottom: 15px;
            text-shadow: 0 2px 30px rgba(233, 30, 99, 0.2);
        }

        .landing-sub {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: #6a1b4d;
            font-weight: 300;
            min-height: 80px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .landing-sub .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%,
            50% {
                opacity: 1;
            }
            51%,
            100% {
                opacity: 0;
            }
        }

        .btn-enter {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.5);
        }

        .btn-enter:active {
            transform: scale(0.97);
        }

        /* ============================================================
           ENVELOPE PAGE - AMPLOP KARTUN SESUAI DESKRIPSI
           ============================================================ */
        #envelopePage {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #envelopePage.active {
            opacity: 1;
            pointer-events: auto;
        }

        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .envelope-container {
            position: relative;
            width: 420px;
            height: 300px;
            perspective: 1000px;
        }

        #envelopeCard {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        #envelopeCard.open {
            transform: rotateX(10deg) scale(0.95);
        }

        /* ===== BADAN AMPLOP ===== */
        .envelope-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #f5e6d3, #e8d5c4);
            border-radius: 20px;
            border: 3px solid #d4b8a0;
            box-shadow: 
                0 15px 45px rgba(0,0,0,0.15),
                inset 0 -4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
            z-index: 5;
        }

        /* ===== LIPATAN BAWAH ===== */
        .fold-bottom {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(180deg, #e5d0bc 0%, #dcc4b0 100%);
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
            z-index: 7;
            box-shadow: inset 0 8px 25px rgba(0,0,0,0.08);
        }

        /* ===== LIPATAN SAMPING KIRI ===== */
        .fold-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #e8d5c4 0%, #dcc4b0 100%);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            z-index: 6;
            box-shadow: inset -6px 0 15px rgba(0,0,0,0.06);
        }

        /* ===== LIPATAN SAMPING KANAN ===== */
        .fold-right {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(225deg, #f0dfce 0%, #e5d0bc 100%);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            z-index: 6;
            box-shadow: inset 6px 0 15px rgba(0,0,0,0.06);
        }

        /* ===== FLAP ATAS (PINK) ===== */
        .envelope-flap {
            position: absolute;
            top: -3px;
            left: -3px;
            width: calc(100% + 6px);
            height: 52%;
            background: linear-gradient(180deg, #ff85a2 0%, #ff6b8a 40%, #e85075 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            z-index: 10;
            transform-origin: bottom center;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid #d45a7a;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            box-shadow: 
                inset 0 -8px 30px rgba(180,50,80,0.15),
                0 4px 20px rgba(0,0,0,0.08);
        }

        /* ===== GARIS TEPI HITAM PADA FLAP ===== */
        .envelope-flap::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px 20px 0 0;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.12);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== SAAT AMPLOP TERBUKA ===== */
        #envelopeCard.open .envelope-flap {
            transform: rotateX(180deg) translateY(-5px);
            box-shadow: 0 -8px 30px rgba(0,0,0,0.1);
            z-index: 2;
            opacity: 0.7;
        }

        /* ===== LABEL OVAL DI POJOK KIRI ATAS ===== */
        .envelope-label {
            position: absolute;
            top: 20px;
            left: 22px;
            width: 110px;
            height: 55px;
            background: rgba(255,255,255,0.85);
            border-radius: 50px;
            border: 2px solid rgba(200,180,170,0.4);
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            color: #8a7a6a;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.04), 0 2px 10px rgba(0,0,0,0.06);
            backdrop-filter: blur(2px);
            pointer-events: none;
            line-height: 1.3;
            text-align: center;
        }

        .envelope-label .small {
            font-size: 7px;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        /* ===== HATI SEGEL DI TENGAH ===== */
        .envelope-heart {
            position: absolute;
            left: 50%;
            top: 52%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            animation: heartbeat 1.5s ease-in-out infinite;
            transition: all 0.5s ease;
            pointer-events: auto;
            cursor: pointer;
        }

        .envelope-heart svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 15px rgba(255,80,120,0.4));
            transition: transform 0.3s ease;
        }

        .envelope-heart:hover svg {
            transform: scale(1.08);
        }

        #envelopeCard.open .envelope-heart {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0) rotate(180deg);
            pointer-events: none;
        }

        @keyframes heartbeat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            14% { transform: translate(-50%, -50%) scale(1.18); }
            28% { transform: translate(-50%, -50%) scale(1); }
            42% { transform: translate(-50%, -50%) scale(1.12); }
            70% { transform: translate(-50%, -50%) scale(1); }
        }

        /* ===== EFEK KILAU DI SISI KANAN ===== */
        .envelope-shine {
            position: absolute;
            right: 8px;
            top: 12%;
            width: 10%;
            height: 55%;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.2) 0%, 
                rgba(255,255,255,0.05) 50%, 
                rgba(255,255,255,0.15) 100%
            );
            border-radius: 50px;
            transform: skewX(-8deg);
            z-index: 12;
            pointer-events: none;
            opacity: 0.5;
        }

        /* ===== BAYANGAN AMPLOP ===== */
        .envelope-shadow {
            position: absolute;
            bottom: -18px;
            left: 5%;
            width: 90%;
            height: 25px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
        }

        /* ===== HINT TEXT ===== */
        .envelope-hint {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #6a1b4d;
            margin-top: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: pulseText 2s ease-in-out infinite;
            z-index: 5;
            position: relative;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* ============================================================
           LETTER PAGE
           ============================================================ */
        #letterPage {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 85;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease, transform 1.5s ease;
            transform: scale(1.2);
            overflow: hidden;
        }

        #letterPage.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .letter-card {
            background: #fffdf7;
            max-width: 620px;
            width: 95%;
            max-height: 80vh;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 30px rgba(233, 30, 99, 0.06);
            border: 1px solid rgba(233, 30, 99, 0.08);
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        .letter-card::-webkit-scrollbar {
            width: 4px;
        }
        .letter-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .letter-card::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .letter-content {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 1.5vw, 1.3rem);
            color: #4a1a2c;
            line-height: 2;
            white-space: pre-wrap;
            min-height: 300px;
        }

        .letter-content .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ad1457;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        .btn-next {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
            margin-top: 25px;
            opacity: 0;
            pointer-events: none;
        }

        .btn-next.show {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        /* ============================================================
           GALLERY PAGE
           ============================================================ */
        #gallery {
            background: linear-gradient(135deg, #fce4ec, #fff5f6, #f8bbd0);
            z-index: 70;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #gallery.active {
            opacity: 1;
            pointer-events: auto;
        }

        .gallery-container {
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 10px 0;
        }

        .gallery-container::-webkit-scrollbar {
            width: 4px;
        }
        .gallery-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .gallery-container::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .gallery-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #880e4f;
            text-align: center;
            margin-bottom: 25px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 5px;
        }

        .gallery-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(233, 30, 99, 0.06);
            opacity: 0;
            transform: translateY(40px);
        }

        .gallery-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.12);
            border-color: rgba(233, 30, 99, 0.15);
        }

        .gallery-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .gallery-card .card-info {
            padding: 15px 18px 18px;
        }

        .gallery-card .card-info h4 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #4a1a2c;
            margin-bottom: 4px;
        }

        .gallery-card .card-info p {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.3px;
        }

        .gallery-btn-wrap {
            text-align: center;
            margin-top: 30px;
        }

        .btn-galaxy {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ad1457);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.3);
        }

        .btn-galaxy:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.4);
        }

        /* ============================================================
           GALAXY PAGE
           ============================================================ */
        #galaxy {
            background: #0a0a0a;
            z-index: 60;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #galaxy.active {
            opacity: 1;
            pointer-events: auto;
        }

        #galaxy-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .galaxy-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            animation: pulseText 3s ease-in-out infinite;
        }

        .galaxy-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 1;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .final-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        .final-message.show {
            opacity: 1;
        }

        .final-message h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 0 40px rgba(233, 30, 99, 0.6), 0 0 80px rgba(233, 30, 99, 0.3);
            margin-bottom: 10px;
        }

        .final-message h2 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #f48fb1;
            text-shadow: 0 0 30px rgba(233, 30, 99, 0.4);
            font-weight: 400;
        }

        .final-message p {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 1.2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            .landing-content {
                padding: 30px 25px;
            }
            .envelope-container {
                width: 280px;
                height: 200px;
            }
            .envelope-heart {
                width: 60px;
                height: 60px;
            }
            .envelope-label {
                width: 80px;
                height: 40px;
                top: 12px;
                left: 14px;
                font-size: 8px;
            }
            .envelope-label .small {
                font-size: 6px;
            }
            .letter-card {
                padding: 30px 20px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }
            .gallery-card img {
                height: 150px;
            }
            .final-message h1 {
                font-size: 1.8rem;
            }
            .final-message h2 {
                font-size: 1.2rem;

        @media (max-width: 400px) {

    <script>
        // ===== LOADING =====
        var loadingScreen = document.getElementById('loadingScreen');
        var loadingNumber = document.getElementById('loadingNumber');
        var loadingFill = document.getElementById('loadingFill');
        var loadProgress = 0;

        function simulateLoading() {
            var interval = setInterval(function() {
                loadProgress += Math.random() * 6 + 3;
                if (loadProgress >= 100) {
                    loadProgress = 100;
                    clearInterval(interval);
                    setTimeout(function() {
                        loadingScreen.classList.add('hide');
                        setTimeout(function() {
                            loadingScreen.style.display = 'none';
                            startTypewriter();
                            startMusic();
                        }, 1500);
                    }, 400);
                }
                updateLoading(loadProgress);
            }, 150);
        }

        function updateLoading(progress) {
            var percent = Math.min(100, Math.round(progress));
            loadingNumber.innerHTML = percent + '<span class="percent">%</span>';
            loadingFill.style.width = percent + '%';
        }

        simulateLoading();

        // ===== FLOATING EMOJIS =====
        var floatingEmojis = [
            '❤️', '💖', '🌸', '✨', '🦋',
            '💕', '🌺', '🌟', '💗', '🌷',
            '💝', '🌈', '💞', '🎀', '🌹',
            '💫', '🍀', '🕊️', '💌', '🌙',
            '🎉', '🎊', '🌻', '💜', '🪷'
        ];

        function createFloatingElements(containerId, count) {
            count = count || 25;
            var container = document.getElementById(containerId);
            if (!container) return;
            for (var i = 0; i < count; i++) {
                var el = document.createElement('div');
                el.className = 'float-item';
                el.textContent = floatingEmojis[Math.floor(Math.random() * floatingEmojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (14 + Math.random() * 28) + 'px';
                el.style.animationDuration = (8 + Math.random() * 14) + 's';
                el.style.animationDelay = (Math.random() * 12) + 's';
                el.style.opacity = 0.3 + Math.random() * 0.5;
                container.appendChild(el);
            }
        }

        createFloatingElements('floatingContainer', 50);
        createFloatingElements('envelopeFloating', 35);
        createFloatingElements('letterFloating', 30);

        // ===== TYPEWRITER =====
        var typewriterText = 'Today is not just a birthday...\nToday is the day the world\nwas blessed with someone\nincredibly special ❤️';
        var typewriterStarted = false;

        function startTypewriter() {
            if (typewriterStarted) return;
            typewriterStarted = true;
            var element = document.getElementById('typewriter');
            var index = 0;
            element.innerHTML = '';

            function type() {
                if (index < typewriterText.length) {
                    var char = typewriterText[index];
                    if (char === '\n') {
                        element.innerHTML += '<br>';
                    } else {
                        element.innerHTML += char;
                    }
                    index++;
                    var delay = 50 + (Math.random() * 30 - 15);
                    setTimeout(type, delay);
                } else {
                    var cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    element.appendChild(cursor);
                }
            }
            type();
        }

        // ===== MUSIC AUTO-PLAY =====
        var audio = document.getElementById('bgMusic');
        var musicStarted = false;
        audio.volume = 0.5;
        audio.loop = true;

        function startMusic() {
            if (musicStarted) return;
            
            // Coba play otomatis
            audio.play().then(function() {
                musicStarted = true;
                console.log('🎵 Musik berjalan!');
            }).catch(function(err) {
                console.log('⚠️ Auto-play diblokir browser, menunggu interaksi user...');
                // Jika auto-play diblokir, mulai saat user klik di mana saja
                document.addEventListener('click', function firstClick() {
                    if (!musicStarted) {
                        audio.play().then(function() {
                            musicStarted = true;
                            console.log('🎵 Musik berjalan (klik)!');
                        }).catch(function(e) {
                            console.log('❌ Gagal play musik:', e);
                        });
                    }
                    document.removeEventListener('click', firstClick);
                }, { once: true });
            });
        }

        // ===== LANDING TO ENVELOPE =====
        var landing = document.getElementById('landing');
        var envelopePage = document.getElementById('envelopePage');
        var btnEnter = document.getElementById('btnEnter');

        btnEnter.addEventListener('click', function() {
            if (!musicStarted) {
                // Jika musik belum jalan, coba play lagi
                audio.play().catch(function() {});
            }
            landing.classList.remove('active');
            landing.classList.add('fade-out');
            setTimeout(function() {
                landing.style.display = 'none';
                envelopePage.classList.add('active');
            }, 1200);
        });

        // ===== ENVELOPE CLICK =====
        var envelopeWrapper = document.getElementById('envelopeWrapper');
        var envelopeCard = document.getElementById('envelopeCard');
        var envelopeHeart = document.getElementById('envelopeHeart');
        var envelopeHint = document.getElementById('envelopeHint');
        var letterPage = document.getElementById('letterPage');
        var letterContent = document.getElementById('letterContent');
        var btnNext = document.getElementById('btnNext');

        var envelopeOpened = false;
        var letterTypingDone = false;

        var letterText = 'happy birthday sayangku cintaku yg santik dan sumel 🤭🤭🤭🤭🤭🤭🤭🤭😚😚😚❤️❤️❤️❤️❤️, panjang umur dan sehat selalu turus ya sayang 🤭🤭🤭🤭🤭😚😚❤️❤️❤️, semoga apa yang sayang harapkan akan secepatnya terwujud, semoga semua yang sayang cita" kan akan terwujud, amiinn....., selamat ke yg 21 tahun sayang 🤭🤭 tidak kerasa sudah makin dewasa dan semoga secepatnya kita menikah dan sayang menjadi ibu dari anak anak kita nantinya 🤭🤭🤭🤭🤭, tetap jadi pribadi yg baik seperti ini terus ya sayang, dan zuga kurang kurangi kumel kumel nya, jangan banyak memarah, kurang kurangi makanan manis" karna cukup liat bee aja sudah manis 🤭, makan yang teratur, jangan begadang", dan harus selalu jadi wanita yg jujur dan baik hati ya sayang 🤭🤭🤭🤭, semangat terus kuliahnya, semangat terus menggapai cita" nya dan semoga rezeki sayang lancar trus mau dari segi apapun itu 🤭🤭, masiyu ya sayang sudah bertahan sejauh ini dan masih menerima bee kembali untuk bersama" menjalani hubungan ini, masiyu untuk semuanya bee senang sekali bisa bertemu dengan sayang, makasi ya atas apa yang sudah sayang berikan kepada bee, makasi udah memberikan kehangatan di dalam keluarga sayang, makasi udah diberikan kasih sayang yang tulus, makasi udah diberikan perhatian yang tiada habisnya, makasi untuk semuanya ya sayang ☹️☹️☹️🤭🤭🤭😚😚❤️❤️❤️, sekali lagi samat ulang tahun cinta nya bee 🤭🤭🤭🤭🤭🤭😚😚😚😚😚😚❤️❤️❤️❤️❤️';

        envelopeHeart.addEventListener('click', function(e) {
            e.stopPropagation();
            if (envelopeOpened) return;
            envelopeOpened = true;

            envelopeCard.classList.add('open');
            envelopeHint.textContent = '💌 Surat terbuka... 💌';

            setTimeout(function() {
                envelopePage.classList.remove('active');
                envelopePage.classList.add('fade-out');

                setTimeout(function() {
                    envelopePage.style.display = 'none';
                    letterPage.classList.add('active');
                    startLetterTypewriter();
                }, 1200);
            }, 1500);
        });

        envelopeWrapper.addEventListener('click', function(e) {
            if (e.target === envelopeHeart || e.target.closest('.envelope-heart')) return;
            if (envelopeOpened) return;
            envelopeHeart.click();
        });

        function startLetterTypewriter() {
            var index = 0;
            letterContent.innerHTML = '';

            function typeLetter() {
                if (index < letterText.length) {
                    var char = letterText[index];
                    if (char === '\n') {
                        letterContent.innerHTML += '<br>';
                    } else {
                        letterContent.innerHTML += char;
                    }
                    index++;
                    var delay = 25 + (Math.random() * 20);
                    setTimeout(typeLetter, delay);
                } else {
                    letterTypingDone = true;
                    btnNext.classList.add('show');
                }
            }

            setTimeout(typeLetter, 600);
        }

        // ===== GALLERY =====
        var galleryPage = document.getElementById('gallery');

        btnNext.addEventListener('click', function() {
            if (!letterTypingDone) return;
            letterPage.classList.remove('active');
            letterPage.classList.add('fade-out');
            setTimeout(function() {
                letterPage.style.display = 'none';
                galleryPage.classList.add('active');
                initGallery();
            }, 1200);
        });

        var galleryData = [
            { img: 'foto/1.jpeg', title: 'First Meet', desc: 'Awal dari segalanya ❤️' },
            { img: 'foto/2.jpg', title: 'Beautiful Smile', desc: 'Senyum yang selalu kurindukan ❤️' },
            { img: 'foto/3.jpeg', title: 'Together', desc: 'Setiap detik bersamamu ❤️' },
            { img: 'foto/4.jpg', title: 'Love You', desc: 'Kamu adalah segalanya ❤️' },
            { img: 'foto/5.jpg', title: 'Forever', desc: 'Untuk selamanya ❤️' },
            { img: 'foto/6.jpg', title: 'Our Happy Moment', desc: 'Bahagia bersamamu selalu ❤️' }
        ];

        var galleryInitialized = false;

        function initGallery() {
            if (galleryInitialized) return;
            galleryInitialized = true;
            var grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            galleryData.forEach(function(item, index) {
                var card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = '<img src="' + item.img + '" alt="' + item.title +
                    '" loading="lazy" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f8bbd0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2230%22%3E📸%3C/text%3E%3C/svg%3E\'">' +
                    '<div class="card-info"><h4>' + item.title + '</h4><p>' + item.desc +
                    '</p></div>';
                grid.appendChild(card);
                setTimeout(function() {
                    card.classList.add('visible');
                }, 200 + index * 180);
            });
        }

        // ===== GALAXY =====
        var galaxyPage = document.getElementById('galaxy');
        var btnGalaxy = document.getElementById('btnGalaxy');

        btnGalaxy.addEventListener('click', function() {
            galleryPage.classList.remove('active');
            galleryPage.classList.add('fade-out');
            setTimeout(function() {
                galleryPage.style.display = 'none';
                galaxyPage.classList.add('active');
                initGalaxy();
            }, 1200);
        });

        var galaxyInitialized = false;
        var scene, camera, renderer, controls;
        var planetSystem, ringSystem;
        var animationId;
        var finalMessageShown = false;
        var zoomCheckInterval = null;
        var galaxyReady = false;

        function initGalaxy() {
            if (galaxyInitialized) return;
            galaxyInitialized = true;
            var loading = document.getElementById('galaxyLoading');
            loading.style.display = 'block';

            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = function() {
                var controlsScript = document.createElement('script');
                controlsScript.src =
                    'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
                controlsScript.onload = function() {
                    loading.style.display = 'none';
                    setupGalaxyScene();
                };
                controlsScript.onerror = function() {
                    loading.textContent = '⚠️ Error loading controls. Please refresh.';
                };
                document.head.appendChild(controlsScript);
            };
            script.onerror = function() {
                loading.textContent = '⚠️ Error loading Three.js. Please refresh.';
            };
            document.head.appendChild(script);
        }

        function createTextTexture(text) {
            var canvas = document.createElement('canvas');
            var size = 256;
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);
            var fontSize = 34;
            ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(233, 30, 99, 0.8)';
            ctx.shadowBlur = 25;
            var gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#ce93d8');
            gradient.addColorStop(0.5, '#b388ff');
            gradient.addColorStop(1, '#9c27b0');
            ctx.fillStyle = gradient;
            ctx.fillText(text, size / 2, size / 2);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.1;
            ctx.fillText(text, size / 2 + 1, size / 2 + 1);
            ctx.globalAlpha = 1;
            var texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function setupGalaxyScene() {
            var canvas = document.getElementById('galaxy-canvas');
            var container = document.getElementById('galaxy');

            scene = new THREE.Scene();
            var aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
            camera.position.set(0, 2, 18);

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                alpha: false,
                antialias: true
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0a, 1);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.6;
            controls.zoomSpeed = 1.0;
            controls.minDistance = 3;
            controls.maxDistance = 30;
            controls.target.set(0, 0, 0);
            controls.enabled = false;
            controls.update();

            var texture = createTextTexture('Bee ❤️ sayang');

            var planetCount = 10000;
            var planetPos = new Float32Array(planetCount * 3);
            var planetSizes = new Float32Array(planetCount);
            var planetColors = new Float32Array(planetCount * 3);

            var colorPalette = [
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
                new THREE.Color('#ce93d8'),
            ];

            for (var i = 0; i < planetCount; i++) {
                var radius = 2.5 + Math.random() * 2.0;
                var theta = Math.random() * Math.PI * 2;
                var phi = Math.acos(2 * Math.random() - 1);
                planetPos[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                planetPos[i * 3 + 1] = radius * Math.cos(phi);
                planetPos[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
                planetSizes[i] = 0.2 + Math.random() * 0.5;
                var color = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                var brightness = 0.7 + Math.random() * 0.3;
                color.multiplyScalar(brightness);
                planetColors[i * 3] = color.r;
                planetColors[i * 3 + 1] = color.g;
                planetColors[i * 3 + 2] = color.b;
            }

            var planetGeo = new THREE.BufferGeometry();
            planetGeo.setAttribute('position', new THREE.BufferAttribute(planetPos, 3));
            planetGeo.setAttribute('size', new THREE.BufferAttribute(planetSizes, 1));
            planetGeo.setAttribute('color', new THREE.BufferAttribute(planetColors, 3));

            var planetMat = new THREE.PointsMaterial({
                size: 0.35,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.92,
                sizeAttenuation: true,
            });

            planetSystem = new THREE.Points(planetGeo, planetMat);
            scene.add(planetSystem);

            var ringCount = 35000;
            var ringPos = new Float32Array(ringCount * 3);
            var ringSizes = new Float32Array(ringCount);
            var ringColors = new Float32Array(ringCount * 3);

            for (var j = 0; j < ringCount; j++) {
                var ringRadius = 4.5 + Math.random() * 4.5;
                var ringAngle = Math.random() * Math.PI * 2;
                var thickness = 0.2 + Math.random() * 0.4;
                var yOffset = (Math.random() - 0.5) * thickness;
                ringPos[j * 3] = ringRadius * Math.cos(ringAngle);
                ringPos[j * 3 + 1] = yOffset * 0.6;
                ringPos[j * 3 + 2] = ringRadius * Math.sin(ringAngle);
                ringSizes[j] = 0.15 + Math.random() * 0.3;
                var ringColor = colorPalette[Math.floor(Math.random() * colorPalette.length)].clone();
                var ringBrightness = 0.4 + Math.random() * 0.6;
                ringColor.multiplyScalar(ringBrightness);
                ringColors[j * 3] = ringColor.r;
                ringColors[j * 3 + 1] = ringColor.g;
                ringColors[j * 3 + 2] = ringColor.b;
            }

            var ringGeo = new THREE.BufferGeometry();
            ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
            ringGeo.setAttribute('size', new THREE.BufferAttribute(ringSizes, 1));
            ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));

            var ringMat = new THREE.PointsMaterial({
                size: 0.2,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true,
                opacity: 0.7,
                sizeAttenuation: true,
            });

            ringSystem = new THREE.Points(ringGeo, ringMat);
            scene.add(ringSystem);

            var starGeo = new THREE.BufferGeometry();
            var starCount = 1500;
            var starPos = new Float32Array(starCount * 3);
            for (var k = 0; k < starCount; k++) {
                var r = 30 + Math.random() * 40;
                var theta2 = Math.random() * Math.PI * 2;
                var phi2 = Math.acos(2 * Math.random() - 1);
                starPos[k * 3] = r * Math.sin(phi2) * Math.cos(theta2);
                starPos[k * 3 + 1] = r * Math.cos(phi2);
                starPos[k * 3 + 2] = r * Math.sin(phi2) * Math.sin(theta2);
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            var starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                transparent: true,
                opacity: 0.4,
                sizeAttenuation: true,
            });
            var stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            var light = new THREE.PointLight(0xe91e63, 0.5, 20);
            light.position.set(0, 0, 0);
            scene.add(light);

            var ambient = new THREE.AmbientLight(0x222244, 0.2);
            scene.add(ambient);

            var light2 = new THREE.DirectionalLight(0xff80ab, 0.3);
            light2.position.set(5, 5, 5);
            scene.add(light2);

            galaxyReady = true;
            startCinematicIntro();

            window.addEventListener('resize', onResize);
            animateGalaxy();
            zoomCheckInterval = setInterval(checkZoomForFinalMessage, 500);
        }

        function startCinematicIntro() {
            var progress = 0;
            var startPos = { x: 0, y: 2, z: 18 };
            var endPos = { x: 0, y: 1.5, z: 10 };

            function animateCinematic() {
                if (!galaxyReady) return;
                progress += 0.008;

                if (progress < 1) {
                    var t = progress < 0.5 ?
                        4 * progress * progress * progress :
                        1 - Math.pow(-2 * progress + 2, 3) / 2;

                    camera.position.x = startPos.x + (endPos.x - startPos.x) * t;
                    camera.position.y = startPos.y + (endPos.y - startPos.y) * t;
                    camera.position.z = startPos.z + (endPos.z - startPos.z) * t;

                    var rotAngle = t * 0.25;
                    camera.position.x += Math.sin(rotAngle) * 1.5;

                    controls.target.set(0, 0, 0);
                    controls.update();

                    requestAnimationFrame(animateCinematic);
                } else {
                    controls.enabled = true;
                }
            }

            setTimeout(animateCinematic, 500);
        }

        function animateGalaxy() {
            animationId = requestAnimationFrame(animateGalaxy);

            if (planetSystem) {
                planetSystem.rotation.y += 0.002;
            }
            if (ringSystem) {
                ringSystem.rotation.y += 0.003;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            var container = document.getElementById('galaxy');
            var width = container.clientWidth;
            var height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function checkZoomForFinalMessage() {
            if (!camera) return;
            var distance = camera.position.distanceTo(controls.target);
            if (distance < 3.5 && !finalMessageShown) {
                finalMessageShown = true;
                var finalMsg = document.getElementById('finalMessage');
                finalMsg.classList.add('show');
                clearInterval(zoomCheckInterval);
            }
        }

        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
            if (zoomCheckInterval) clearInterval(zoomCheckInterval);
            if (renderer) renderer.dispose();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && landing.classList.contains('active')) {
                btnEnter.click();
            }
        });

        document.getElementById('galaxy-canvas').addEventListener('touchstart', function(e) {
            if (e.target === this) e.preventDefault();
        }, { passive: false });

        console.log('❤️ Happy Birthday Rara Rindu Reski! ❤️');
        console.log('🌌 Website by Bee');
    </script>
